# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  clean:
    desc: Remove generated files and binaries
    cmds:
      - rm -f credd creddserver
      - grep -l "// Code generated by sqlc. DO NOT EDIT." db/*.go | xargs -r rm
      - rm -rf gen

  format:
    desc: Run the autoformatter
    cmds:
      - go tool gofumpt -w -l .

  generate:
    run: once
    desc: Generate all required code
    cmds:
      - sqlc generate
      - buf generate
    sources:
      - db/src/**/*.sql
      - proto/**/*.proto
    generates:
      - gen/**/*.pb.go
      - db/**/*.go
      - exclude: db/migrate.go

  build-client:
    desc: Build the client binary
    deps: [ generate ]
    cmds:
      - go build -o credd cmd/credd/main.go

  build-server:
    desc: Build the server binary
    deps: [ generate ]
    cmds:
      - go build -o creddserver cmd/creddserver/main.go

  build:
    desc: Build both the client and server binaries
    deps: [ build-client, build-server ]

  create-migration:
    desc: Create a new database migration file
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Migration filename required. Usage: task create-migration -- <filename>"
    cmds:
      - goose -s create -dir db/src/migrations "{{.CLI_ARGS}}" sql
