version: v2

clean: true

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: credd/gen/go

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.6.2
    out: gen/go
    opt: paths=source_relative

inputs:
  - directory: proto
